name: grype scan
on: 
  push: 
    branches: [main, master]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Scan current project
      uses: anchore/scan-action@v7
      with:
        path: "."
        fail-build: true
        severity-cutoff: critical
